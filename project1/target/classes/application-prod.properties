spring.application.name=networth-tracker
server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=require}
spring.datasource.username=${DB_USER:${PGUSER:}}
spring.datasource.password=${DB_PASSWORD:${PGPASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
