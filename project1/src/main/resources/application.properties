spring.application.name=networth-tracker
server.port=8080

# PostgreSQL connection (Railway-compatible defaults)
# Railway provides PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD automatically.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:networth}?sslmode=require}
spring.datasource.username=${DB_USER:${PGUSER:postgres}}
spring.datasource.password=${DB_PASSWORD:${PGPASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CORS for frontend app (comma-separated)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
